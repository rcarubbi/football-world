schema: spec-driven

context: |
  Tech stack: TypeScript, Next.js 16 (App Router), React 19, Tailwind CSS 4, Three.js
  Database: Turso (libSQL hosted SQLite)
  Linter: oxlint (never eslint)
  Language: Portuguese-BR for .version.ts entries
  Architecture: src/lib/db/ = repository layer (all SQL), src/app/ = application layer
  Deployment: Vercel with daily cron at 06:00 UTC
  Domain: Football wiki — leagues, teams, players, matches, World Cup
